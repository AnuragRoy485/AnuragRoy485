name: Daily Contribution

on:
  schedule:
    # Runs every day at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Activity File
        run: |
          echo "Last Updated: $(date)" > activity.txt

      - name: Commit and Push Changes
        run: |
          git config user.name "AnuragRoy485"
          git config user.email "76765293+AnuragRoy485@users.noreply.github.com"

          git add activity.txt
          git commit -m "Daily contribution update" || exit 0
          git push
