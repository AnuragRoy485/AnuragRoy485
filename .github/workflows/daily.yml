name: Daily Contribution

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update README
        run: |
          echo "" >> README.md
          echo "Last Updated: $(date)" >> README.md

      - name: Commit Changes
        run: |
          git config user.name "AnuragRoy485"
          git config user.email "YOUR_GITHUB_EMAIL"

          git add README.md
          git commit -m "Auto update profile" || exit 0
          git push
